<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .background-image {
            background-image: url('image.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-pink-50 min-h-screen flex items-center justify-center font-sans">

    <!-- Primera Pantalla -->
    <div id="screen1" class="text-center p-6 transition-opacity duration-700">
        <h1 class="text-3xl md:text-4xl font-bold text-pink-600 mb-8 italic">
            Este mensaje es para la niña más preciosa en mi vida
        </h1>
        <button onclick="showNext()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform hover:scale-105">
            Presiona aquí ❤️
        </button>
    </div>

    <!-- Segunda Pantalla (oculta inicialmente) -->
    <div id="screen2" class="hidden fixed inset-0 background-image flex justify-center p-4">
        <div class="bg-white/80 backdrop-blur-sm p-8 rounded-3xl shadow-2xl max-w-lg text-center border-4 border-pink-200 mt-40">
            <p class="text-lg md:text-xl text-gray-800 leading-relaxed font-medium">
                "Eres lo más bello que me ha pasado en esta vida, añoro cada momento que pasamos juntos, esos bellos momentos los adoraré toda la vida, y espero creemos muchos más recuerdos juntos en el futuro."
            </p>
        </div>
    </div>

    <script>
        function showNext() {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
        }
    </script>
</body>
</html>
